<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abhishek ❤️ Pooja</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔱 GANESHA OPENING -->
<div id="opening">
  <img src="assets/ganesha.png" class="ganesha">
  <h1>Om Shree Ganeshaya Namah</h1>
  <button onclick="enterSite()">Welcome 💫</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<!-- 🌐 MAIN CONTENT -->
<div id="main">

  <!-- HERO -->
  <section class="hero">
    <h1>Abhishek 💍 Pooja</h1>
    <p>We invite you to celebrate our wedding</p>
  </section>

  <!-- 📸 IMAGE SLIDER -->
  <section class="slider">
    <img src="assets/photo1.jpg" class="slide active">
    <img src="assets/photo2.jpg" class="slide">
  </section>

  <!-- 🎬 VIDEO -->
  <section class="video">
    <video controls>
      <source src="assets/video.mp4" type="video/mp4">
    </video>
  </section>

  <!-- 📜 EVENTS -->
  <section class="events">

    <div class="card">
      <h2>Wedding</h2>
      <p>10–11 April 2026</p>
      <p>Kalaburgi</p>
      <a href="https://maps.google.com" target="_blank">View Location</a>
    </div>

    <div class="card">
      <h2>Reception</h2>
      <p>12 April 2026 | 12:00 PM</p>
      <p>Bhavasar Bhavan A/C Hall</p>
      <a href="https://maps.google.com" target="_blank">View Location</a>
    </div>

  </section>

  <!-- 🙏 THANK YOU -->
  <section class="thankyou">
    <h2>Kurdekar Family</h2>
    <p>With Love & Blessings</p>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
