<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abhishek ❤️ Pooja</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🔱 OPENING -->
<div id="opening">
  <img src="assets/ganesha.png" class="ganesha">
  <h1 class="sanskrit">Om Shree Ganeshaya Namah</h1>
  <button onclick="enterSite()">Enter Invitation</button>
</div>

<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<!-- 🌐 MAIN -->
<div id="main">

<!-- 🛕 TEMPLE HEADER -->
<div class="temple-header"></div>

<!-- HERO -->
<section class="hero fade-in">
  <h1 class="names">Abhishek 💍 Pooja</h1>
  <p class="tagline">Together with their families invite you</p>
</section>

<!-- 📸 SLIDER -->
<section class="slider fade-in">
  <img src="assets/photo1.jpg" class="slide active">
  <img src="assets/photo2.jpg" class="slide">
</section>

<!-- 🎬 VIDEO -->
<section class="video fade-in">
  <video controls>
    <source src="assets/video.mp4" type="video/mp4">
  </video>
</section>

<!-- 📜 EVENTS -->
<section class="events fade-in">

  <div class="card">
    <h2>Wedding Ceremony</h2>
    <p>10–11 April 2026</p>
    <p>Kalaburgi</p>
    <a href="#">View Location</a>
  </div>

  <div class="card">
    <h2>Reception</h2>
    <p>12 April 2026 | 12:00 PM</p>
    <p>Bhavasar Bhavan A/C Hall</p>
    <a href="#">View Location</a>
  </div>

</section>

<!-- 🙏 FAMILY -->
<section class="family fade-in">
  <h2>Kurdekar Family</h2>
  <p>With Love & Blessings</p>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
