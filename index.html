<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abhishek ❤️ Pooja</title>

<!-- IMPORTANT -->
<link rel="stylesheet" href="./style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <img src="assets/ganesha.png" class="ganesha">
  <h1>Om Shree Ganeshaya Namah</h1>
  <button onclick="enterSite()">Enter Invitation</button>
</div>

<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<!-- MAIN -->
<div id="main">

<div class="overlay"></div>

<section class="hero fade-in">
  <h1 class="names">Abhishek 💍 Pooja</h1>
  <p>We invite you to celebrate our wedding</p>
</section>

<section class="photo-section fade-in">
  <img src="assets/photo1.jpg">
  <img src="assets/photo2.jpg">
</section>

<section class="events fade-in">
  <div class="card">
    <h2>Wedding</h2>
    <p>10–11 April 2026</p>
  </div>

  <div class="card">
    <h2>Reception</h2>
    <p>12 April 2026</p>
  </div>
</section>

<section class="video-section fade-in">
  <video controls>
    <source src="assets/video.mp4">
  </video>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
